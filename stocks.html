<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Prices — PolitiSignal</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%234f7dff'/%3E%3Cstop offset='1' stop-color='%237c5cfc'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpolyline points='4,20 8,20 11,11 15,23 18,15 21,20 25,20 28,20' fill='none' stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #04050a; --bg2: #080910; --bg3: #0d0e18;
  --surface: #111220; --surface2: #171828;
  --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.10); --border3: rgba(255,255,255,0.16);
  --text: #eceef8; --text2: #8b8fa8; --text3: #4a4d62;
  --accent: #4f7dff; --accent2: #7c5cfc;
  --red: #ff4757; --green: #2ecc71; --amber: #f1c40f;
}
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Bricolage Grotesque', sans-serif; background: var(--bg); color: var(--text); display: flex; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes flashGreen { 0%{background:rgba(46,204,113,0.2)} 100%{background:transparent} }
@keyframes flashRed { 0%{background:rgba(255,71,87,0.2)} 100%{background:transparent} }

/* ── SIDEBAR ── */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; height: 100vh; overflow-y: auto;
}
.sidebar-logo {
  padding: 20px 18px 16px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border); text-decoration: none;
}
.logo-icon {
  width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
}
.logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; color: var(--text); }
.logo-sub { font-size: 9px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.5px; margin-top: 1px; }
.sidebar-section { padding: 16px 10px 8px; }
.sidebar-label { font-size: 9px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 10px;
  border-radius: 8px; cursor: pointer; transition: all 0.15s;
  font-size: 13px; color: var(--text2); text-decoration: none; border: none; background: none; width: 100%;
}
.nav-item:hover { background: var(--surface); color: var(--text); }
.nav-item.active { background: rgba(79,125,255,0.12); color: var(--accent); }
.nav-item .icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
.sidebar-footer { margin-top: auto; padding: 14px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.user-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; flex-shrink: 0; }
.user-name { font-size: 13px; font-weight: 600; color: var(--text); }
.user-plan { font-size: 10px; color: var(--accent); font-family: 'DM Mono', monospace; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; margin-left: auto; flex-shrink: 0; }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; min-width: 0; }
.topbar { padding: 0 20px; height: 60px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; }
.topbar-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.live-badge { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--green); background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.25); padding: 3px 8px; border-radius: 999px; display: flex; align-items: center; gap: 5px; }
.live-badge-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.btn-sm { padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: 'Bricolage Grotesque', sans-serif; display: flex; align-items: center; gap: 6px; border: none; white-space: nowrap; }
.btn-ghost-sm { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
.btn-ghost-sm:hover { background: var(--surface); color: var(--text); }
.last-updated { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

/* ── CONTENT ── */
.content { flex: 1; overflow-y: auto; padding: 24px; }
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── CATEGORY SECTION ── */
.category { margin-bottom: 32px; }
.category-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.category-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); }
.category-count { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text3); background: var(--surface); padding: 2px 8px; border-radius: 999px; }

/* ── TICKER GRID ── */
.ticker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.ticker-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; cursor: pointer; transition: all 0.2s; text-decoration: none;
  display: block; animation: fadeIn 0.3s ease both;
}
.ticker-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.ticker-card.up { border-left: 3px solid var(--green); }
.ticker-card.down { border-left: 3px solid var(--red); }
.ticker-card.flat { border-left: 3px solid var(--text3); }
.ticker-card.flash-green { animation: flashGreen 0.8s ease; }
.ticker-card.flash-red { animation: flashRed 0.8s ease; }
.tc-symbol { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.tc-name { font-size: 11px; color: var(--text3); margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tc-price { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.tc-change { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
.tc-change.up { color: var(--green); }
.tc-change.down { color: var(--red); }
.tc-change.flat { color: var(--text3); }
.tc-arrow { font-size: 10px; }
.tc-no-data { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 4px; }

/* ── LOADING / EMPTY ── */
.loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 12px; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 13px; }
.loading-state .icon { font-size: 32px; opacity: 0.4; }
.no-data-note { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; text-align: center; font-size: 13px; color: var(--text2); line-height: 1.7; font-family: 'DM Mono', monospace; }
.no-data-note a { color: var(--accent); text-decoration: none; }
.no-data-note a:hover { text-decoration: underline; }

/* ── TICKER TAPE ── */
.tape-wrapper { overflow: hidden; background: var(--bg3); border-bottom: 1px solid var(--border); height: 34px; flex-shrink: 0; position: relative; }
.tape-track { display: flex; align-items: center; height: 100%; gap: 0; white-space: nowrap; animation: tape 60s linear infinite; }
@keyframes tape { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.tape-item { display: inline-flex; align-items: center; gap: 6px; padding: 0 18px; font-family: 'DM Mono', monospace; font-size: 11px; border-right: 1px solid var(--border); height: 100%; }
.tape-sym { color: var(--text); font-weight: 600; }
.tape-price { color: var(--text2); }
.tape-chg { font-weight: 500; }
.tape-chg.up { color: var(--green); }
.tape-chg.down { color: var(--red); }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .ticker-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .content { padding: 16px; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <a class="sidebar-logo" href="/app.html">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 32 32" fill="none">
        <path d="M16 7 Q10 7 10 13 L10 15 L22 15 L22 13 Q22 7 16 7Z" fill="white" opacity=".9"/>
        <rect x="14.5" y="4" width="3" height="4" rx="1.5" fill="white" opacity=".9"/>
        <rect x="8" y="15" width="16" height="2" rx="1" fill="white" opacity=".7"/>
        <polyline points="4,24 8,24 11,20 14,26 17,21 20,24 24,24 28,24" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">PolitiSignal</div>
      <div class="logo-sub">MARKET INTEL</div>
    </div>
  </a>

  <div class="sidebar-section">
    <div class="sidebar-label">Navigation</div>
    <a class="nav-item" href="/app.html">
      <span class="icon">⚡</span><span>Live Feed</span>
    </a>
    <a class="nav-item active" href="/stocks.html">
      <span class="icon">📈</span><span>Stock Prices</span>
    </a>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Info</div>
    <a class="nav-item" href="/" style="text-decoration:none">
      <span class="icon">🏠</span><span>Home</span>
    </a>
  </div>

  <div class="sidebar-footer">
    <div class="user-avatar">PS</div>
    <div>
      <div class="user-name">Trader</div>
      <div class="user-plan">PRO PLAN</div>
    </div>
    <div class="live-dot"></div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">

  <!-- TICKER TAPE -->
  <div class="tape-wrapper" id="tape-wrapper" style="display:none">
    <div class="tape-track" id="tape-track"></div>
  </div>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-title">
      📈 Market Prices
      <span class="live-badge"><span class="live-badge-dot"></span>LIVE</span>
    </div>
    <div class="topbar-right">
      <span class="last-updated" id="last-updated">Loading…</span>
      <button class="btn-sm btn-ghost-sm" onclick="loadPrices()">↻ Refresh</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content">
    <div class="loading-state">
      <div class="icon">📡</div>
      <div>Fetching market data…</div>
    </div>
  </div>

</div>

<script>
// Categorized watchlist — all politically relevant tickers
const CATEGORIES = [
  {
    name: "Defense & Government",
    emoji: "🛡️",
    tickers: ["LMT","RTX","NOC","GD","BA","KTOS","PLTR","CACI","SAIC","BAH"]
  },
  {
    name: "Energy & Oil",
    emoji: "⚡",
    tickers: ["XOM","CVX","COP","SLB","HAL","EOG","MPC","PSX","VLO","OXY"]
  },
  {
    name: "Financials & Banks",
    emoji: "🏦",
    tickers: ["JPM","BAC","GS","MS","WFC","C","BLK","SCHW","AXP","V"]
  },
  {
    name: "Tech & AI",
    emoji: "💻",
    tickers: ["AAPL","MSFT","GOOGL","META","AMZN","NVDA","TSLA","AMD","INTC","ORCL"]
  },
  {
    name: "Pharma & Healthcare",
    emoji: "💊",
    tickers: ["JNJ","PFE","MRNA","ABBV","UNH","CVS","HCA","MDT","BMY","LLY"]
  },
  {
    name: "Crypto",
    emoji: "₿",
    tickers: ["BTC-USD","ETH-USD","SOL-USD","DOGE-USD","XRP-USD"]
  },
  {
    name: "Indices & ETFs",
    emoji: "📊",
    tickers: ["SPY","QQQ","DIA","IWM","GLD","TLT","VXX","ARKK","XLE","XLF"]
  }
];

let prices = {};

async function loadPrices() {
  try {
    const res = await fetch('data/prices.json?t=' + Date.now());
    prices = await res.json();
    renderAll();
  } catch (e) {
    renderError();
  }
}

function renderAll() {
  const content = document.getElementById('content');
  const keys = Object.keys(prices);

  if (keys.length === 0) {
    content.innerHTML = `
      <div class="no-data-note">
        <div style="font-size:28px;margin-bottom:12px;">📡</div>
        <div>No price data yet — the GitHub Actions workflow fetches prices every 10 minutes.</div>
        <div style="margin-top:8px;font-size:11px;color:var(--text3);">
          Prices update automatically when signals are fetched from political sources.
        </div>
      </div>`;
    return;
  }

  // Update last-updated
  const anyTicker = prices[keys[0]];
  if (anyTicker && anyTicker._updated) {
    const d = new Date(anyTicker._updated);
    document.getElementById('last-updated').textContent = 'Updated ' + d.toLocaleTimeString();
  }

  // Build ticker tape
  buildTape(keys);

  // Build category sections
  let html = '';
  for (const cat of CATEGORIES) {
    const catTickers = cat.tickers.filter(t => prices[t] || prices[t.replace('-USD','')]);
    // also include any that match partially
    const available = cat.tickers.filter(t => {
      const key = t;
      return prices[key] !== undefined;
    });
    if (available.length === 0) continue;

    html += `<div class="category">`;
    html += `<div class="category-header">
      <span style="font-size:16px">${cat.emoji}</span>
      <span class="category-title">${cat.name}</span>
      <span class="category-count">${available.length} tickers</span>
    </div>`;
    html += `<div class="ticker-grid">`;
    for (const ticker of available) {
      html += tickerCard(ticker);
    }
    html += `</div></div>`;
  }

  // Any tickers in prices.json not in any category
  const allCatTickers = new Set(CATEGORIES.flatMap(c => c.tickers));
  const extras = keys.filter(k => !allCatTickers.has(k));
  if (extras.length > 0) {
    html += `<div class="category">`;
    html += `<div class="category-header">
      <span style="font-size:16px">📌</span>
      <span class="category-title">Other Tickers in Signals</span>
      <span class="category-count">${extras.length} tickers</span>
    </div>`;
    html += `<div class="ticker-grid">`;
    for (const ticker of extras) {
      html += tickerCard(ticker);
    }
    html += `</div></div>`;
  }

  content.innerHTML = html || `<div class="no-data-note">No matching price data found.</div>`;
}

function tickerCard(ticker) {
  const p = prices[ticker];
  if (!p) return '';
  const up = p.change_pct > 0;
  const down = p.change_pct < 0;
  const cls = up ? 'up' : down ? 'down' : 'flat';
  const sign = up ? '+' : '';
  const arrow = up ? '▲' : down ? '▼' : '—';
  const priceColor = up ? 'var(--green)' : down ? 'var(--red)' : 'var(--text)';
  const yahooTicker = ticker; // BTC-USD works on Yahoo
  return `<a class="ticker-card ${cls}" href="https://finance.yahoo.com/quote/${encodeURIComponent(yahooTicker)}" target="_blank" rel="noopener">
    <div class="tc-symbol">${ticker}</div>
    <div class="tc-name">${p.name || ticker}</div>
    <div class="tc-price" style="color:${priceColor}">${formatPrice(p.price)}</div>
    <div class="tc-change ${cls}">
      <span class="tc-arrow">${arrow}</span>
      <span>${sign}${p.change_pct.toFixed(2)}%</span>
    </div>
  </a>`;
}

function formatPrice(price) {
  if (price === null || price === undefined) return '—';
  if (price >= 1000) return '$' + price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  if (price >= 1) return '$' + price.toFixed(2);
  return '$' + price.toFixed(4);
}

function buildTape(keys) {
  const wrapper = document.getElementById('tape-wrapper');
  const track = document.getElementById('tape-track');
  const items = keys
    .filter(k => prices[k] && prices[k].price != null)
    .map(k => {
      const p = prices[k];
      const up = p.change_pct >= 0;
      const sign = up ? '+' : '';
      const chgCls = up ? 'up' : 'down';
      return `<div class="tape-item">
        <span class="tape-sym">${k}</span>
        <span class="tape-price">${formatPrice(p.price)}</span>
        <span class="tape-chg ${chgCls}">${sign}${p.change_pct.toFixed(2)}%</span>
      </div>`;
    });

  if (items.length === 0) return;
  // Duplicate for seamless loop
  const inner = items.join('');
  track.innerHTML = inner + inner;
  wrapper.style.display = 'block';
}

function renderError() {
  document.getElementById('content').innerHTML = `
    <div class="no-data-note">
      <div style="font-size:28px;margin-bottom:12px;">⚠️</div>
      <div>Could not load price data. Make sure you're serving from a web server (not file://).</div>
    </div>`;
}

// Load on start, auto-refresh every 10 min
loadPrices();
setInterval(loadPrices, 10 * 60 * 1000);
</script>
</body>
</html>
