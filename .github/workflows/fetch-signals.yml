name: Fetch Political Signals

on:
  schedule:
    - cron: "*/5 * * * *"    # every 5 minutes
  workflow_dispatch:           # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests yfinance

      - name: Run fetcher
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/fetch_signals.py

      - name: Commit and push if changed
        run: |
          git config user.name "politisignal-bot"
          git config user.email "bot@politisignal.com"
          git add data/signals.json data/prices.json
          git diff --staged --quiet || (git commit -m "chore: update signals + prices $(date -u +'%Y-%m-%dT%H:%M:%SZ')" && git pull --rebase && git push)

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 0e35c6f8560ade68d4ac01a4bdd33f35
        run: |
          npm install -g wrangler
          wrangler pages deploy . --project-name politisignal --commit-dirty=true
